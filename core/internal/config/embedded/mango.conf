# Dankestia — MangoWM configuration (managed by `dankestia setup`)
# Keybinds, colors, layout, outputs, cursor and window rules are pulled from the
# ./dankestia fragments below. Add your own binds/rules here; they sit alongside DANKESTIA's.

env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland

# exec-once runs only at startup. Do NOT use exec= for the shell: mango re-runs
# every exec= on each config reload, and DANKESTIA reloads the config, which would
# spawn a new shell on every reload.
exec-once=dankestia run

source=./dankestia/colors.conf
source=./dankestia/layout.conf
source=./dankestia/cursor.conf
source=./dankestia/outputs.conf
source=./dankestia/windowrules.conf
source=./dankestia/binds.conf
